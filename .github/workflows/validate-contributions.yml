name: Validate contributions

on:
  pull_request:
    paths:
      - "skills/**"
      - "rules/**"
      - "mcps/**"
      - "lib/validate_catalog.py"
      - ".github/workflows/validate-contributions.yml"

jobs:
  validate:
    # Job name = the status-check context that branch protection requires.
    # Must stay exactly "Validate contributions" to match the required check.
    name: Validate contributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate catalog
        run: python lib/validate_catalog.py
