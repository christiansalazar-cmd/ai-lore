name: Validate contributions

on:
  pull_request:
    paths:
      - "skills/**"
      - "rules/**"
      - "mcps/**"
      - "lib/validate_catalog.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate catalog
        run: python lib/validate_catalog.py
